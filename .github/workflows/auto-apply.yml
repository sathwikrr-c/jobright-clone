name: Auto-Apply Worker

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:        # Manual trigger
    inputs:
      job_url:
        description: 'Optional: specific job portal URL to apply to'
        required: false
        type: string

jobs:
  auto-apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright with Chromium
        run: npx playwright install chromium --with-deps

      - name: Run auto-apply worker
        run: npx tsx src/worker/index.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          JSEARCH_API_KEY: ${{ secrets.JSEARCH_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
          APPLY_JOB_URL: ${{ inputs.job_url }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apply-screenshots-${{ github.run_number }}
          path: /tmp/screenshots/
          retention-days: 7
          if-no-files-found: ignore
